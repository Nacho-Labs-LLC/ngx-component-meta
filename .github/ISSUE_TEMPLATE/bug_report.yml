name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal code or steps to reproduce. A small `.component.ts` snippet is ideal.
      render: typescript
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: typescript-version
    attributes:
      label: TypeScript version
      placeholder: "5.7.0"

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "22.0.0"
